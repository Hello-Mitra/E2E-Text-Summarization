name: CI/CD Pipeline — Sentiment Analysis

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Cache pip ───────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.backend.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.backend.txt

      # ── 4b. Force reinstall DVC with S3 support ───────────────────────────
      - name: Install DVC with S3 support
        run: |
          pip install "dvc[s3]" --force-reinstall
          pip install setuptools==69.5.1 wheel --force-reinstall --ignore-installed
          python -c "import pkg_resources; print('✅ pkg_resources OK')"

      # ── 5. Download NLTK data ──────────────────────────────────────────────
      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords'); nltk.download('wordnet')"

      # ── 6. Configure AWS credentials ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_DEFAULT_REGION }}

      # ── 7. Pull DVC artifacts + run pipeline ───────────────────────────────
      - name: Pull DVC artifacts from S3
        run: dvc pull

      - name: Run DVC pipeline
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc repro

      # ── 8. Run model tests ─────────────────────────────────────────────────
      - name: Run model tests
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python -m unittest tests/test_model.py

      # ── 9. Promote model to Production ────────────────────────────────────
      - name: Promote model to Production
        if: success()
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python scripts/promote_model.py

      # ── 10. Run FastAPI app tests ──────────────────────────────────────────
      - name: Run FastAPI app tests
        if: success()
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python -m unittest tests/test_app.py

      # ── 11. Login to Amazon ECR ────────────────────────────────────────────
      - name: Login to Amazon ECR
        if: success()
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 12. Build Docker images ────────────────────────────────────────────
      - name: Build Backend Docker image
        if: success()
        run: docker build -f Dockerfile.backend -t sentiment-backend .

      - name: Build Frontend Docker image
        if: success()
        run: docker build -f Dockerfile.frontend -t sentiment-frontend .

      # ── 13. Tag and push images to ECR ─────────────────────────────────────
      - name: Tag and push Backend image
        if: success()
        run: |
          docker tag sentiment-backend:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:latest
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:latest

      - name: Tag and push Frontend image
        if: success()
        run: |
          docker tag sentiment-frontend:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:latest
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:latest

      # ── 14. Deploy to EKS ──────────────────────────────────────────────────
      - name: Set up kubectl
        if: success()
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Update kubeconfig for EKS
        if: success()
        run: |
          aws eks update-kubeconfig \
          --region ${{ secrets.AWS_DEFAULT_REGION }} \
          --name sentiment-app-cluster

      - name: Create Kubernetes secret
        if: success()
        run: |
          kubectl create secret generic capstone-secret \
            --from-literal=CAPSTONE_TEST=${{ secrets.CAPSTONE_TEST }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend to EKS
        if: success()
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
        run: |
          envsubst < k8s/deployment-backend.yaml | kubectl apply -f -

      - name: Deploy frontend to EKS
        if: success()
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
        run: |
          envsubst < k8s/deployment-frontend.yaml | kubectl apply -f -

      - name: Deploy prometheus to EKS
        if: success()
        run: kubectl apply -f k8s/deployment-prometheus.yaml

      - name: Deploy grafana to EKS
        if: success()
        run: kubectl apply -f k8s/deployment-grafana.yaml