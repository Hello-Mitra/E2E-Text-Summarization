name: CI/CD Pipeline — Sentiment Analysis

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Cache pip ───────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.backend.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install backend dependencies ───────────────────────────────────
      - name: Install backend dependencies
        run: pip install -r requirements.backend.txt

      # ── 5. Download NLTK data ──────────────────────────────────────────────
      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords'); nltk.download('wordnet')"

      # ── 6. Run DVC pipeline ────────────────────────────────────────────────
      - name: Configure AWS credentials for DVC
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ secrets.AWS_REGION }}

      - name: Run DVC pipeline
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: dvc repro

      # ── 7. Run model tests ─────────────────────────────────────────────────
      - name: Run model tests
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python -m unittest tests/test_model.py

      # ── 8. Promote model to Production in MLflow ───────────────────────────
      - name: Promote model to Production
        if: success()
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python scripts/promote_model.py

      # ── 9. Run FastAPI app tests ───────────────────────────────────────────
      - name: Run FastAPI app tests
        if: success()
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python -m unittest tests/test_app.py

